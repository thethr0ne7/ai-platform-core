name: PROIDU MAI ingestion

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: proidu-mai-ingestion-production
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify before execution
        run: npm run verify

      - name: Build worker
        run: npm run build

      - name: Run bounded ingestion
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PROIDU_MAI_QUERY: "программная инженерия"
        run: npm run worker:proidu-mai
