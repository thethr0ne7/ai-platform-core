name: Web UI

on:
  pull_request:
    paths:
      - "apps/web/**"
      - ".github/workflows/web-ui.yml"
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - ".github/workflows/web-ui.yml"

permissions:
  contents: read

jobs:
  verify-web:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Typecheck
        run: npm run check
      - name: Build
        run: npm run build
