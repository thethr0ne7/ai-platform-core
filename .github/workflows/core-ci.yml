name: Core CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  core:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Verify core
        run: npm run verify

      - name: Build core
        run: npm run build
