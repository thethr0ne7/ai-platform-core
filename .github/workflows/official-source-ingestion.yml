name: Official Source Ingestion

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
    inputs:
      from:
        description: "Start date YYYY-MM-DD (optional)"
        required: false
        type: string
      to:
        description: "End date YYYY-MM-DD (optional)"
        required: false
        type: string
      query:
        description: "Official document search query (optional)"
        required: false
        type: string
      page_size:
        description: "Items per source page"
        required: false
        default: "30"
        type: choice
        options:
          - "10"
          - "30"
          - "100"
      max_pages:
        description: "Maximum pages per source"
        required: false
        default: "3"
        type: choice
        options:
          - "1"
          - "3"
          - "5"
          - "10"

permissions:
  contents: read

concurrency:
  group: official-source-ingestion-production
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  ingest:
    name: Ingest official sources
    if: github.repository == 'thethr0ne7/ai-platform-core'
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NODE_ENV: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci --ignore-scripts

      - name: Validate required secrets
        run: |
          set -euo pipefail
          if [[ -z "${SUPABASE_URL:-}" ]]; then
            echo "::error::Repository secret SUPABASE_URL is not configured"
            exit 1
          fi
          if [[ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]]; then
            echo "::error::Repository secret SUPABASE_SERVICE_ROLE_KEY is not configured"
            exit 1
          fi
          if [[ "$SUPABASE_URL" != https://* ]]; then
            echo "::error::SUPABASE_URL must use HTTPS"
            exit 1
          fi
          echo "Required secrets are present. Secret values are not printed."

      - name: Verify ingestion code
        run: npm run verify

      - name: Build ingestion arguments
        id: args
        env:
          INPUT_FROM: ${{ inputs.from }}
          INPUT_TO: ${{ inputs.to }}
          INPUT_QUERY: ${{ inputs.query }}
          INPUT_PAGE_SIZE: ${{ inputs.page_size }}
          INPUT_MAX_PAGES: ${{ inputs.max_pages }}
        run: |
          set -euo pipefail

          args=("--page-size" "${INPUT_PAGE_SIZE:-30}" "--max-pages" "${INPUT_MAX_PAGES:-3}")

          if [[ -n "${INPUT_FROM:-}" ]]; then
            [[ "$INPUT_FROM" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]] || { echo "::error::from must use YYYY-MM-DD"; exit 1; }
            args+=("--from" "$INPUT_FROM")
          fi

          if [[ -n "${INPUT_TO:-}" ]]; then
            [[ "$INPUT_TO" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]] || { echo "::error::to must use YYYY-MM-DD"; exit 1; }
            args+=("--to" "$INPUT_TO")
          fi

          if [[ -n "${INPUT_QUERY:-}" ]]; then
            [[ ${#INPUT_QUERY} -le 200 ]] || { echo "::error::query is too long"; exit 1; }
            args+=("--query" "$INPUT_QUERY")
          fi

          printf '%q ' "${args[@]}" > ingestion-args.txt
          echo "Prepared bounded ingestion arguments."

      - name: Run official source ingestion
        id: ingest
        run: |
          set -euo pipefail
          mapfile -t _unused < /dev/null
          read -r -a args <<< "$(cat ingestion-args.txt)"
          npm run ingest:official -- "${args[@]}" | tee ingestion-result.json

      - name: Publish run summary
        if: always()
        run: |
          {
            echo "## Official Source Ingestion"
            echo
            echo "- Repository: \`${GITHUB_REPOSITORY}\`"
            echo "- Trigger: \`${GITHUB_EVENT_NAME}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- UTC: \`$(date -u +'%Y-%m-%dT%H:%M:%SZ')\`"
            echo
            if [[ -s ingestion-result.json ]]; then
              echo "### Result"
              echo '```json'
              tail -c 12000 ingestion-result.json
              echo
              echo '```'
            else
              echo "No ingestion result was produced. Check the failed step logs."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload sanitized ingestion result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: official-source-ingestion-${{ github.run_id }}
          path: ingestion-result.json
          if-no-files-found: ignore
          retention-days: 14
